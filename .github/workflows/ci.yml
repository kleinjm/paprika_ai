name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  rspec:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      # The real Paprika SQLite DB isn't present in CI; use a throwaway writable
      # file (all Paprika queries are stubbed in the specs anyway).
      PAPRIKA_DATABASE_PATH: tmp/paprika_ci.sqlite3
      PAPRIKA_READONLY: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build Paprika SQLite stub
        run: |
          mkdir -p tmp
          sqlite3 tmp/paprika_ci.sqlite3 < db/paprika_schema.sql

      - name: Prepare test database
        run: bin/rails db:test:prepare

      - name: Run RSpec
        run: bundle exec rspec
